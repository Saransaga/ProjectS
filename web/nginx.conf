server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxied same-origin so the httpOnly session cookie set by
    # api/app/auth.py just works — no CORS configuration needed anywhere.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://api:8000/healthz;
    }

    # SPA fallback: any non-API path that doesn't match a built asset is
    # handled client-side by react-router-dom.
    location / {
        try_files $uri /index.html;
    }
}
